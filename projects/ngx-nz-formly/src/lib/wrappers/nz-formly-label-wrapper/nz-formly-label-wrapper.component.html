@if(props.labelPosition === 'top') {
  <div class="nz-formly-label-top">
    <ng-container *ngTemplateOutlet="Label"></ng-container>
    <ng-container #fieldComponent></ng-container>
  </div>
} @else if (props.labelPosition === 'inline') {
  <div class="nz-formly-label-inline">
    <div class="nz-formly-field-wrapper">
      <div [ngStyle]="{ width: props.styles?.labelWidth }">
        <ng-container *ngTemplateOutlet="Label"></ng-container>
      </div>
      <div class="flex-grow-1">
        <ng-container #fieldComponent></ng-container>
      </div>
    </div>
  </div>
} @else if (props.labelPosition === 'float') {
  <div
    class="nz-formly-label-float"
    [class.fixed]="formControl.value !== null && formControl.value !== undefined && formControl.value !== ''"
    >
    <ng-container #fieldComponent></ng-container>
    <ng-container *ngTemplateOutlet="Label"></ng-container>
  </div>
} @else {
  <ng-container #fieldComponent></ng-container>
}

<ng-template #Label>
  @if (props.label || (props.labelObs | async)) {
    <label
      class="nz-formly-label"
      [ngClass]="props.styles?.labelClass"
      >
      <span [innerHTML]="props.label || (props.labelObs | async)"></span>
      @if (props.required) {
        <span class="nz-formly-label-required">*</span>
      }
    </label>
  }
</ng-template>
