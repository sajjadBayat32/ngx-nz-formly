<nz-input-group
  [nzAddOnAfter]="props.nzAddOnAfter"
  [nzAddOnBefore]="props.nzAddOnBefore"
  [nzAddOnAfterIcon]="props.nzAddOnAfterIcon"
  [nzAddOnBeforeIcon]="props.nzAddOnBeforeIcon"
  [nzPrefix]="props.nzPrefix"
  [nzSuffix]="props.nzSuffix"
  [nzSize]="props.nzSize || 'default'"
>
  <input
    #input
    nz-input
    [id]="fieldID"
    [formControl]="formControl"
    [formlyAttributes]="field"
    [mask]="mask"
    [thousandSeparator]="props.thousandSeparator"
    [type]="type"
    [nzStatus]="status"
    [attr.disabled]="props.nzDisabled"
    [readonly]="props.nzReadonly"
    [placeholder]="props.nzPlaceholder"
    [nzVariant]="props.nzBorderless ? 'borderless' : 'outlined'"
  />
  @if (props.type === 'password') {
    <div class="nz-formly-show-password">
      <span
        nz-icon
        nzTheme="outline"
        role="button"
        tabindex="0"
        (click)="changeShowPassword(input)"
        (keyup.enter)="changeShowPassword(input)"
        [nzType]="showPassword(input) ? 'eye-invisible' : 'eye'"
      ></span>
    </div>
  }
</nz-input-group>
