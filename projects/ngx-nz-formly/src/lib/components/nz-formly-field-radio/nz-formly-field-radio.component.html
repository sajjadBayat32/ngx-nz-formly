<nz-radio-group
  [id]="fieldID"
  [formControl]="formControl"
  [formlyAttributes]="field"
  [nzName]="props.nzName"
  [nzDisabled]="props.nzDisabled"
  [nzSize]="props.nzSize"
  [nzButtonStyle]="props.nzButtonStyle"
>
  @if (props.nzType === 'nz-radio') {
    @for (item of props.nzOptions; track item) {
      <label nz-radio [nzDisabled]="item.disabled" [nzValue]="item.value">
        {{ item.label }}
        <div [innerHTML]="item.nzCustomContent"></div>
      </label>
    }
  }
  @if (props.nzType === 'nz-radio-button') {
    @for (item of props.nzOptions; track item) {
      <label nz-radio-button [nzDisabled]="item.disabled" [nzValue]="item.value">
        {{ item.label }}
        <div [innerHTML]="item.nzCustomContent"></div>
      </label>
    }
  }
</nz-radio-group>
